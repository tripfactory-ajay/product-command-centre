<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>New Commercial Team — TripFactory</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#F0F2F5;color:#1a2332;display:flex;flex-direction:column}

/* HEADER */
.hdr{background:linear-gradient(135deg,#0D1B2A,#1A3050);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #C8102E;flex-shrink:0}
.hdr h1{font-size:15px;font-weight:700;color:#fff}
.hdr h1 em{color:#C9A84C;font-style:normal}
.hdr p{font-size:10px;color:#8fa8c0;margin-top:1px}
.badge{background:#C8102E;color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px}
#save-btn{background:#C9A84C;color:#0D1B2A;border:none;padding:4px 11px;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer}

/* BAR */
.bar{background:#fff;border-bottom:1px solid #dde3ec;padding:5px 14px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;flex-shrink:0}
.bar label{font-size:9px;font-weight:700;color:#7a8ba0;text-transform:uppercase;letter-spacing:.4px}
.fsel{padding:3px 7px;border:1px solid #c5cdd9;border-radius:5px;font-size:10px;color:#374151;background:#f9fafb;cursor:pointer;outline:none}
#clear-btn{margin-left:auto;padding:3px 9px;border:1px solid #fca5a5;background:#fff5f5;color:#C8102E;border-radius:5px;font-size:9px;font-weight:600;cursor:pointer}
#role-count{font-size:9px;color:#7a8ba0}
.vbtn{padding:3px 9px;border:1px solid #c5cdd9;border-radius:5px;font-size:10px;background:#fff;cursor:pointer;color:#374151}
.vbtn.on{background:#0D1B2A;color:#fff;border-color:#0D1B2A;font-weight:600}

/* CANVAS — fills remaining height, scrolls vertically only */
.canvas{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 8px 40px;display:flex;justify-content:center}

/* SCALE WRAPPER */
.scale-wrap{transform-origin:top center;transition:transform .2s}

/* ORG */
.org{display:flex;flex-direction:column;align-items:center;gap:0}
.vline{width:2px;height:14px;background:#c5cdd9;margin:0 auto;flex-shrink:0}

/* CARDS — base 130px */
:root{--cw:130px;--gap:8px;--fs:9px;--fsub:8px}
.card{width:var(--cw);background:#fff;border-radius:7px;border:2px solid #dde3ec;box-shadow:0 1px 5px rgba(0,0,0,.07);flex-shrink:0;transition:.15s}
.card:hover{box-shadow:0 4px 14px rgba(0,0,0,.13);transform:translateY(-1px)}

/* card type colours */
.t-cpso{border-color:#C9A84C!important;background:linear-gradient(160deg,#fffbee,#fff)!important}
.t-dir {border-color:#0D1B2A!important}
.t-mice{border-color:#C8102E!important}
.t-pm  {border-color:#0A7E8C!important}
.t-con {border-color:#0B6E4F!important}
.t-conn{border-color:#1E40AF!important}
.t-sup {border-color:#F59E0B!important;background:#fffbf0!important}

.card-hd{padding:5px 7px 3px;display:flex;align-items:flex-start;justify-content:space-between;gap:3px}
.ctitle{font-size:var(--fs);font-weight:700;text-transform:uppercase;letter-spacing:.25px;line-height:1.3;flex:1}
.t-cpso .ctitle{color:#92700A}
.t-dir  .ctitle{color:#0D1B2A}
.t-mice .ctitle{color:#991B1B}
.t-pm   .ctitle{color:#0A7E8C}
.t-con  .ctitle{color:#0B6E4F}
.t-conn .ctitle{color:#1E40AF}
.t-sup  .ctitle{color:#D97706}
.csub{font-size:7px;color:#9ca3af;margin-top:1px;line-height:1.3}

/* JD */
.jd-wrap{position:relative;flex-shrink:0}
.jd-btn{width:13px;height:13px;border-radius:50%;background:#0D1B2A;color:#fff;font-size:8px;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.jd-tip{display:none;position:absolute;top:16px;right:0;width:210px;background:#0D1B2A;color:#d1dce8;font-size:9.5px;line-height:1.55;padding:7px 9px;border-radius:7px;box-shadow:0 8px 28px rgba(0,0,0,.45);z-index:500;white-space:normal}
.jd-tip b{color:#C9A84C;display:block;margin-bottom:2px}
.jd-tip li{margin-left:10px;margin-bottom:1px}
.jd-wrap:hover .jd-tip{display:block}

/* SLOTS */
.slots{padding:3px 5px 5px;display:flex;flex-direction:column;gap:2px}
.slot{border:1.5px dashed #c5cdd9;border-radius:4px;min-height:26px;display:flex;align-items:center;padding:2px 5px;gap:3px;cursor:pointer;transition:.1s;background:#fafbfc}
.slot:hover:not(.filled){border-color:#0A7E8C;background:#f0fbfc}
.slot.filled{border-style:solid;border-color:#e5e7eb;background:#fff;cursor:default}
.snum{font-size:8px;color:#9ca3af;min-width:9px;flex-shrink:0}
.sinfo{flex:1;min-width:0}
.sname{font-size:9px;font-weight:600;color:#1a2332;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stitle{font-size:7px;color:#9ca3af;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sempty{font-size:8px;color:#c5cdd9;font-style:italic}
.sx{margin-left:auto;width:11px;height:11px;border-radius:50%;background:#fee2e2;border:none;color:#C8102E;font-size:8px;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.slot.filled:hover .sx{display:flex}
.addslot{height:18px;border:1.5px dashed #e5e7eb;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:8px;color:#c5cdd9;transition:.1s}
.addslot:hover{border-color:#0A7E8C;color:#0A7E8C;background:#f0fbfc}

/* CONNECTOR BARS */
.hbar{position:relative;flex-shrink:0}

/* SUPPORT BAND */
.sup-row{display:flex;gap:var(--gap);justify-content:center;margin-top:4px}
.sup-card{background:#fffbf0;border:2px solid #F59E0B;border-radius:7px;padding:5px 8px;flex:1;max-width:200px;cursor:pointer;transition:.15s;text-align:center}
.sup-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.1);transform:translateY(-1px)}
.sup-card .sl{font-size:9px;font-weight:700;color:#D97706;text-transform:uppercase;letter-spacing:.3px}
.sup-card .sc{font-size:11px;font-weight:800;color:#0D1B2A;margin:1px 0}
.sup-card .ss{font-size:7.5px;color:#9ca3af}
.sup-filled{font-size:7.5px;color:#0A7E8C;margin-top:2px}

/* SECTION LABELS */
.sec-row{display:flex;gap:var(--gap);justify-content:center;margin-bottom:4px}
.sec-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:1px 8px;border-radius:20px;text-align:center}

/* TIER ROWS */
.tier-row{display:flex;gap:var(--gap);justify-content:center;align-items:flex-start}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(13,27,42,.5);z-index:999;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;width:400px;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.mhd{padding:11px 13px 7px;border-bottom:1px solid #dde3ec}
.mhd h3{font-size:12px;font-weight:700;color:#0D1B2A}
.mhd p{font-size:9.5px;color:#7a8ba0;margin-top:1px}
.mfilt{padding:6px 10px 5px;border-bottom:1px solid #dde3ec;display:flex;flex-direction:column;gap:4px}
.mrow{display:flex;gap:4px}
.msearch{flex:2;padding:5px 8px;border:1px solid #c5cdd9;border-radius:6px;font-size:11px;outline:none}
.msearch:focus{border-color:#0A7E8C}
.msel{flex:1;padding:5px;border:1px solid #c5cdd9;border-radius:6px;font-size:10px;color:#374151;background:#f9fafb;outline:none}
.mlist{overflow-y:auto;flex:1;padding:4px 8px}
.mitem{padding:5px 6px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.1s}
.mitem:hover{background:#f0fbfc}
.mav{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.aL{background:#0D1B2A}.aP{background:#0A7E8C}.aS{background:#1E40AF}.aO{background:#065F46}
.aT{background:#5B21B6}.aF{background:#92400E}.aH{background:#7C3AED}.aX{background:#4A5568}
.mname{font-size:11px;font-weight:600;color:#1a2332}
.msub2{font-size:9px;color:#9ca3af}
.mcount{font-size:10px;color:#9ca3af;padding:4px 10px;text-align:center}
.mft{padding:8px 12px;border-top:1px solid #dde3ec;display:flex;justify-content:flex-end}
.mcx{padding:4px 12px;border:1px solid #c5cdd9;background:#fff;border-radius:6px;font-size:11px;cursor:pointer}

/* SUMMARY */
#summary-view{display:none;max-width:880px;width:100%;padding:12px}
.ssec{background:#fff;border-radius:8px;border:1px solid #dde3ec;margin-bottom:9px;overflow:hidden}
.sshd{padding:6px 11px;font-size:10px;font-weight:700;color:#fff}
.ssrow{display:flex;align-items:center;padding:5px 11px;border-bottom:1px solid #f0f2f5;gap:8px}
.ssrow:last-child{border-bottom:none}
.ssrole{font-size:9.5px;color:#7a8ba0;width:190px;flex-shrink:0}
.ssname{font-size:11px;font-weight:600}
.ssempty{font-size:9.5px;color:#c5cdd9;font-style:italic}
</style>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
#orn-nav{display:none;position:fixed;top:0;left:0;right:0;z-index:99999;
  background:#000;height:44px;align-items:center;padding:0 18px;gap:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.5);font-family:'Plus Jakarta Sans',sans-serif;
  font-size:.77rem}
#orn-nav.show{display:flex}
#orn-nav a{color:rgba(255,255,255,.65);text-decoration:none;font-weight:600;
  transition:.2s;white-space:nowrap}
#orn-nav a:hover{color:#fff}
.orn-sep{width:1px;height:18px;background:rgba(255,255,255,.15);flex-shrink:0}
.orn-spacer{flex:1}
.orn-user{color:rgba(255,255,255,.4);font-size:.72rem}
.orn-signout{color:rgba(255,255,255,.5);text-decoration:none;font-size:.71rem;
  border:1px solid rgba(255,255,255,.2);padding:3px 9px;border-radius:6px;
  transition:.2s;cursor:pointer}
.orn-signout:hover{color:#fff;border-color:rgba(255,255,255,.5)}
.orn-spacer-top{height:44px}
</style>
<style>
#loginPage,#loginScreen{display:none!important;visibility:hidden!important}
#orn-nav{display:none;position:fixed;top:0;left:0;right:0;z-index:999999;
  background:#000;height:46px;align-items:center;padding:0 18px;gap:14px;
  box-shadow:0 2px 8px rgba(0,0,0,.5)}
#orn-nav.show{display:flex}
.on-logo{height:30px}
.on-sep{width:1px;height:20px;background:rgba(255,255,255,.15);flex-shrink:0}
.on-back{color:rgba(255,255,255,.7);text-decoration:none;font-size:.75rem;font-weight:700}
.on-back:hover{color:#fff}
.on-title{color:rgba(255,255,255,.3);font-size:.7rem;letter-spacing:.5px;text-transform:uppercase}
.on-space{flex:1}
.on-user{color:rgba(255,255,255,.4);font-size:.72rem}
.on-out{background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);
  padding:3px 10px;border-radius:6px;font-size:.7rem;cursor:pointer}
.on-out:hover{color:#fff;border-color:rgba(255,255,255,.5)}
</style>

<script>
(function(){
  var SK='orn_hub_session',GH='https://tripfactory-ajay.github.io/product-command-centre';
  try{
    var sess=JSON.parse(localStorage.getItem(SK)||'null');
    if(!sess||!sess.name||(Date.now()-sess.ts)>28800000){
      localStorage.removeItem(SK);window.location.href=GH+'/index.html';return;
    }
    sess.ts=Date.now();localStorage.setItem(SK,JSON.stringify(sess));
    var nav=document.getElementById('orn-nav');if(nav)nav.classList.add('show');
    var u=document.getElementById('on-user');if(u)u.textContent=sess.name;
    var t=document.getElementById('on-title');if(t)t.textContent=document.title;
    var lp=document.getElementById('loginPage');if(lp)lp.style.cssText='display:none!important';
    var ls=document.getElementById('loginScreen');if(ls)ls.style.cssText='display:none!important';
    ['app','appContainer','mainApp'].forEach(function(id){
      var e=document.getElementById(id);
      if(e&&(e.style.display===''||e.style.display==='none'))e.style.display='block';
    });
  }catch(e){window.location.href=GH+'/index.html';}
})();
</script>

// ── STATE ─────────────────────────────────────────────────────────────────────
var alloc = {};
try{var _s=localStorage.getItem('comm_v5');if(_s)alloc=JSON.parse(_s);}catch(e){}
var activeRole=null, activeSlot=null;

function avCls(d){var m={Leadership:'aL',Product:'aP',Sales:'aS',Operations:'aO',Technology:'aT',Finance:'aF','HR & Admin':'aH'};return m[d]||'aX';}
function ini(n){return(n||'').split(' ').slice(0,2).map(function(w){return w[0]||'';}).join('').toUpperCase();}
function el(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt!==undefined)e.textContent=txt;return e;}
function R(id){return ROLES.find(function(r){return r.id===id;});}

// ── CARD ─────────────────────────────────────────────────────────────────────
function buildCard(role){
  var c=el('div','card t-'+role.t);
  var hd=el('div','card-hd');
  var tw=el('div');tw.style.flex='1';
  tw.appendChild(el('div','ctitle',role.label));
  if(role.sub)tw.appendChild(el('div','csub',role.sub));
  var jw=el('div','jd-wrap');
  var jb=el('button','jd-btn','i');
  var jt=el('div','jd-tip');
  var jh='<b>'+role.label+'</b><ul>';
  role.jd.forEach(function(j){jh+='<li>'+j+'</li>';});
  jt.innerHTML=jh+'</ul>';
  jw.appendChild(jb);jw.appendChild(jt);
  hd.appendChild(tw);hd.appendChild(jw);c.appendChild(hd);
  var sc=el('div','slots');
  var ppl=(alloc[role.id]||[]).filter(Boolean);
  var show=Math.max(role.slots,ppl.length);
  for(var i=0;i<show;i++)buildSlot(sc,role,i,ppl[i]||null);
  var am=el('div','addslot','+ Add');
  (function(r,len){am.onclick=function(){openModal(r.id,len);};})(role,ppl.length);
  sc.appendChild(am);c.appendChild(sc);
  return c;
}

function buildSlot(container,role,idx,person){
  var sl=el('div','slot'+(person?' filled':''));
  sl.appendChild(el('span','snum',String(idx+1)));
  if(person){
    var inf=el('div','sinfo');
    inf.appendChild(el('div','sname',person.n));
    inf.appendChild(el('div','stitle',(person.t||'')+(person.l?' · '+person.l:'')));
    var x=el('button','sx','×');
    (function(rid,i){x.onclick=function(e){e.stopPropagation();rmv(rid,i);};})(role.id,idx);
    sl.appendChild(inf);sl.appendChild(x);
  }else{
    sl.appendChild(el('span','sempty','Click to assign'));
    (function(rid,i){sl.onclick=function(){openModal(rid,i);};})(role.id,idx);
  }
  container.appendChild(sl);
}

// ── TREE ─────────────────────────────────────────────────────────────────────
var CW=130, GAP=8;

function vl(){return el('div','vline');}

function hbar(n){
  // horizontal connector bar spanning n cards
  var total=n*CW+(n-1)*GAP;
  var wrap=el('div','hbar');
  wrap.style.cssText='position:relative;height:14px;width:'+total+'px;flex-shrink:0';
  if(n<2){
    var v2=el('div');v2.style.cssText='width:2px;height:14px;background:#c5cdd9;margin:0 auto';
    wrap.appendChild(v2);return wrap;
  }
  var line=el('div');line.style.cssText='position:absolute;top:0;left:0;right:0;height:2px;background:#c5cdd9';
  wrap.appendChild(line);
  for(var i=0;i<n;i++){
    var d=el('div');
    d.style.cssText='position:absolute;top:0;width:2px;height:14px;background:#c5cdd9;left:'+(i*(CW+GAP)+Math.floor(CW/2))+'px';
    wrap.appendChild(d);
  }
  return wrap;
}

function colOf(arr){
  var c=el('div');c.style.cssText='display:flex;flex-direction:column;align-items:center';
  arr.forEach(function(ch){c.appendChild(ch);});return c;
}

function rowOf(ids){
  var r=el('div');r.style.cssText='display:flex;gap:'+GAP+'px;align-items:flex-start;justify-content:center';
  ids.forEach(function(id){r.appendChild(buildCard(R(id)));});return r;
}

function buildTree(){
  var tv=document.getElementById('tree-view');
  tv.innerHTML='';

  // ── LAYOUT: CPSO on top, then 3 column sections side by side ─────────────
  // Each section has its Director at top, children below.
  // CPSO sits above all 3 with a connector spanning full width.

  var OUTER_GAP = GAP*4; // 32px between sections

  // ── MICE section ──────────────────────────────────────────────────────────
  var miceCol=el('div');miceCol.style.cssText='display:flex;flex-direction:column;align-items:center';
  miceCol.appendChild(buildCard(R('dir-mice')));
  miceCol.appendChild(vl());
  miceCol.appendChild(hbar(2));
  var gmRow=el('div');gmRow.style.cssText='display:flex;gap:'+GAP+'px';
  gmRow.appendChild(colOf([buildCard(R('gm-eu')),vl(),buildCard(R('con-mice-eu'))]));
  gmRow.appendChild(colOf([buildCard(R('gm-rotw')),vl(),buildCard(R('con-mice-rotw'))]));
  miceCol.appendChild(gmRow);
  miceCol.appendChild(vl());
  var msBand=el('div');msBand.style.cssText='display:flex;gap:6px;justify-content:center';
  ['sup-mice-load','sup-mice-cre','sup-mice-sales'].forEach(function(id){msBand.appendChild(buildCard(R(id)));});
  miceCol.appendChild(msBand);

  // ── PRODUCT section ───────────────────────────────────────────────────────
  var prodCol=el('div');prodCol.style.cssText='display:flex;flex-direction:column;align-items:center';
  prodCol.appendChild(buildCard(R('dir-prod')));
  prodCol.appendChild(vl());
  prodCol.appendChild(hbar(6));
  var pmIds=['pm-eu','pm-me','pm-sea','pm-ind','pm-usa','pm-din'];
  var conIds=['con-eu','con-me','con-sea','con-ind','con-usa','con-din'];
  var pmConRow=el('div');pmConRow.style.cssText='display:flex;gap:'+GAP+'px;align-items:flex-start';
  pmIds.forEach(function(pmId,i){
    pmConRow.appendChild(colOf([buildCard(R(pmId)),vl(),buildCard(R(conIds[i]))]));
  });
  prodCol.appendChild(pmConRow);
  prodCol.appendChild(vl());
  var psBand=el('div');psBand.style.cssText='display:flex;gap:6px;justify-content:center';
  ['sup-prod-load','sup-prod-cre','sup-prod-sales'].forEach(function(id){psBand.appendChild(buildCard(R(id)));});
  prodCol.appendChild(psBand);

  // ── CONNECTIVITY section ──────────────────────────────────────────────────
  var connCol=el('div');connCol.style.cssText='display:flex;flex-direction:column;align-items:center';
  connCol.appendChild(buildCard(R('dir-conn')));
  connCol.appendChild(vl());
  connCol.appendChild(hbar(2));
  var connRow=el('div');connRow.style.cssText='display:flex;gap:'+GAP+'px';
  connRow.appendChild(colOf([buildCard(R('hd-chan')),vl(),buildCard(R('conn-admin'))]));
  connRow.appendChild(colOf([buildCard(R('hd-api')),vl(),buildCard(R('conn-tech'))]));
  connCol.appendChild(connRow);

  // ── ASSEMBLE t3 ───────────────────────────────────────────────────────────
  var t3=el('div');t3.style.cssText='display:flex;gap:'+OUTER_GAP+'px;justify-content:center;align-items:flex-start;margin-top:0';

  t3.appendChild(miceCol);
  t3.appendChild(prodCol);
  t3.appendChild(connCol);

  // CPSO + spanning connector above t3
  // We use a post-render measurement via requestAnimationFrame
  var wrapper=el('div');wrapper.style.cssText='display:flex;flex-direction:column;align-items:center';
  var cpsoCard=buildCard(R('cpso'));
  var cpsoVl=vl();
  wrapper.appendChild(cpsoCard);
  wrapper.appendChild(cpsoVl);

  // Placeholder for the top hbar — we'll size it after t3 is in DOM
  var topBar=el('div');topBar.style.cssText='height:14px;position:relative';
  wrapper.appendChild(topBar);
  wrapper.appendChild(t3);
  tv.appendChild(wrapper);

  // After render, measure t3 and size the top connector bar
  requestAnimationFrame(function(){
    var t3W=t3.offsetWidth;
    var cpsoW=cpsoCard.offsetWidth;
    // horizontal bar spanning t3 width
    topBar.style.width=t3W+'px';
    var tl=el('div');tl.style.cssText='position:absolute;top:0;left:0;right:0;height:2px;background:#c5cdd9';
    topBar.appendChild(tl);
    // drops at centre of each section (MICE, Product, Conn)
    var miceW=2*CW+GAP, prodW=6*CW+5*GAP, connW=2*CW+GAP;
    var centers=[
      miceW/2,
      miceW+OUTER_GAP+prodW/2,
      miceW+OUTER_GAP+prodW+OUTER_GAP+connW/2
    ];
    centers.forEach(function(cx){
      var d=el('div');d.style.cssText='position:absolute;top:0;width:2px;height:14px;background:#c5cdd9;left:'+Math.round(cx-1)+'px';
      topBar.appendChild(d);
    });
    applyScale();
  });
  updateCount();
}

// ── RESPONSIVE SCALING ────────────────────────────────────────────────────────
function applyScale(){
  var wrap=document.getElementById('scale-wrap');
  var vw=window.innerWidth;
  var treeW=document.getElementById('tree-view').scrollWidth;
  var available=vw-32; // padding
  if(treeW>available){
    var s=Math.max(0.55,available/treeW);
    wrap.style.transform='scale('+s.toFixed(3)+')';
    wrap.style.width=(treeW)+'px';
    wrap.style.marginLeft='auto';
    wrap.style.marginRight='auto';
    // adjust canvas height to scaled content
    var canvas=document.getElementById('canvas');
    canvas.style.justifyContent='flex-start';
  }else{
    wrap.style.transform='';
    wrap.style.width='';
  }
}
window.addEventListener('resize',applyScale);

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(roleId,slotIdx){
  activeRole=roleId;activeSlot=slotIdx;
  var role=R(roleId);
  document.getElementById('m-title').textContent='Assign: '+role.label;
  document.getElementById('m-sub').textContent='Slot '+(slotIdx+1);
  document.getElementById('m-q').value='';
  document.getElementById('m-dept').value=document.getElementById('tb-dept').value||'';
  document.getElementById('m-loc').value='';
  document.getElementById('overlay').classList.add('open');
  document.getElementById('m-q').focus();
  mSearch();
}
function closeModal(){document.getElementById('overlay').classList.remove('open');activeRole=null;activeSlot=null;}

function mSearch(){
  var q=(document.getElementById('m-q').value||'').toLowerCase();
  var dept=document.getElementById('m-dept').value;
  var loc=(document.getElementById('m-loc').value||'').toLowerCase();
  var used={};
  Object.keys(alloc).forEach(function(k){(alloc[k]||[]).filter(Boolean).forEach(function(p){used[p.n]=true;});});
  var res=STAFF.filter(function(s){
    if(used[s.n])return false;
    if(dept&&s.d!==dept)return false;
    if(loc&&(s.l||'').toLowerCase().indexOf(loc)===-1)return false;
    if(!q)return true;
    return[s.n,s.t,s.d,s.l].some(function(v){return v&&v.toLowerCase().indexOf(q)!==-1;});
  }).slice(0,80);
  var list=document.getElementById('m-list');list.innerHTML='';
  res.forEach(function(s){
    var it=el('div','mitem');
    var av=el('div','mav '+avCls(s.d),ini(s.n));
    var info=el('div');
    info.appendChild(el('div','mname',s.n));
    info.appendChild(el('div','msub2',(s.t||'')+(s.l?' · '+s.l:'')));
    it.appendChild(av);it.appendChild(info);
    (function(staff){it.onclick=function(){assign(staff);};})(s);
    list.appendChild(it);
  });
  document.getElementById('m-count').textContent=res.length+' people'+(res.length===80?' (refine search)':'');
}

function assign(s){
  if(!activeRole)return;
  if(!alloc[activeRole])alloc[activeRole]=[];
  while(alloc[activeRole].length<=activeSlot)alloc[activeRole].push(null);
  alloc[activeRole][activeSlot]=s;
  closeModal();buildTree();
}
function rmv(rid,idx){if(alloc[rid])alloc[rid].splice(idx,1);buildTree();}
function clearAll(){if(confirm('Clear all allocations?')){alloc={};buildTree();}}
function saveAlloc(){
  try{localStorage.setItem('comm_v5',JSON.stringify(alloc));}catch(e){}
  var b=document.getElementById('save-btn');
  b.textContent='\u2713 Saved';
  setTimeout(function(){b.textContent='\uD83D\uDCBE Save';},1800);
}
function updateCount(){
  var f=0,t=0;
  ROLES.forEach(function(r){t+=r.slots;f+=(alloc[r.id]||[]).filter(Boolean).length;});
  document.getElementById('role-count').textContent=f+'/'+t+' filled';
  document.getElementById('fill-count').textContent=f+'/'+t+' filled';
}

  {lbl:'Product Division — Contractors',col:'#0B6E4F',ids:['con-eu','con-me','con-sea','con-ind','con-usa','con-din']},

  {lbl:'Product Support Teams',col:'#B45309',ids:['sup-prod-load','sup-prod-cre','sup-prod-sales']},

function renderSummary(){
  var sv=document.getElementById('summary-view');sv.innerHTML='';
  SECS.forEach(function(sec){
    var div=el('div','ssec');
    var hd=el('div','sshd',sec.lbl);hd.style.background=sec.col;div.appendChild(hd);
    sec.ids.forEach(function(id){
      var role=R(id);if(!role)return;
      var ppl=(alloc[id]||[]).filter(Boolean);
      var show=Math.max(role.slots,ppl.length,1);
      for(var i=0;i<show;i++){
        var row2=el('div','ssrow');
        row2.appendChild(el('div','ssrole',role.label));
        if(ppl[i]){
          var nm=el('div');nm.style.flex='1';
          nm.innerHTML='<span class="ssname">'+ppl[i].n+'</span><span style="font-size:9px;color:#9ca3af"> &middot; '+(ppl[i].t||'')+(ppl[i].l?' &middot; '+ppl[i].l:'')+'</span>';
          row2.appendChild(nm);
        }else{
          var em=el('div','ssempty','Vacant');em.style.flex='1';row2.appendChild(em);
        }
        div.appendChild(row2);
      }
    });
    sv.appendChild(div);
  });
}

function setView(v){
  document.getElementById('tree-view').style.display=v==='tree'?'':'none';
  document.getElementById('summary-view').style.display=v==='summary'?'block':'none';
  document.getElementById('btn-tree').className='vbtn'+(v==='tree'?' on':'');
  document.getElementById('btn-sum').className='vbtn'+(v==='summary'?' on':'');
  if(v==='summary')renderSummary();
  else applyScale();
}
